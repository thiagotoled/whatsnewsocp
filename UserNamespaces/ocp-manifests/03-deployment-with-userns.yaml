apiVersion: v1
kind: ServiceAccount
metadata:
  name: teste
  namespace: userns-lab
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: use-anyuid
  namespace: userns-lab
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:anyuid
subjects:
- kind: ServiceAccount
  name: teste
  namespace: userns-lab
---  
apiVersion: apps/v1
kind: Deployment
metadata:
  name: userns-demo-isolated
  namespace: userns-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: userns-demo-isolated
  template:
    metadata:
      labels:
        app: userns-demo-isolated
    spec:
      serviceAccountName: teste
      hostUsers: false
      containers:
      - name: demo
        image: registry.access.redhat.com/ubi9/ubi
        command:
        - /bin/bash
        - -c
        - |
          echo "=== id ==="
          id
          echo
          echo "=== uid_map ==="
          cat /proc/self/uid_map || true
          echo
          echo "=== gid_map ==="
          cat /proc/self/gid_map || true
          echo
          sleep 3600
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL