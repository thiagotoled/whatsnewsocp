apiVersion: apps/v1
kind: Deployment
metadata:
  name: userns-demo-isolated
  namespace: userns-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: userns-demo-isolated
  template:
    metadata:
      labels:
        app: userns-demo-isolated
    spec:
      hostUsers: false
      containers:
        - name: demo
          image: registry.access.redhat.com/ubi9/ubi
          command:
            - /bin/bash
            - -c
            - |
              echo "=== id ==="
              id
              echo
              echo "=== uid_map ==="
              cat /proc/self/uid_map || true
              echo
              echo "=== gid_map ==="
              cat /proc/self/gid_map || true
              echo
              sleep 3600
