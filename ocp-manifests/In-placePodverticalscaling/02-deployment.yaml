apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-inplace
  namespace: lab-inplace-scaling
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-inplace
  template:
    metadata:
      labels:
        app: nginx-inplace
    spec:
      containers:
      - name: nginx
        image: quay.io/packit/nginx-unprivileged:latest
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        # CRUCIAL: Define que a alteração de CPU/Memória não deve reiniciar o container
        resizePolicy:
        - resourceName: cpu
          restartPolicy: NotRequired
        - resourceName: memory
          restartPolicy: NotRequired
