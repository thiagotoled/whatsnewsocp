apiVersion: apps/v1
kind: Deployment
metadata:
  name: target-app
  namespace: lab-acs-debug-attach
  labels:
    app: target-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: target-app
  template:
    metadata:
      labels:
        app: target-app
    spec:
      containers:
        - name: app
          image: registry.access.redhat.com/ubi9/ubi-minimal:latest
          command: ["sleep", "infinity"]
